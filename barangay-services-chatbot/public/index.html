<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barangay Services Chatbot</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0d1117;
        color: #e5edf8;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid #30363d;
        border-radius: 24px;
        background: #161b22;
      }

      textarea,
      button {
        width: 100%;
        border-radius: 14px;
        font: inherit;
      }

      textarea {
        min-height: 120px;
        padding: 14px;
        color: #e5edf8;
        background: #0d1117;
        border: 1px solid #30363d;
      }

      button {
        margin-top: 12px;
        padding: 12px 16px;
        color: white;
        border: 0;
        background: #0070f3;
        cursor: pointer;
      }

      #answer {
        margin-top: 18px;
        line-height: 1.6;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Beginner Starter Kit</p>
      <h1>Barangay Services Chatbot</h1>
      <textarea id="message">What do I need for a barangay clearance?</textarea>
      <button id="ask">Ask Aldabra AI</button>
      <div id="answer"></div>
    </main>

    <script>
      const button = document.querySelector("#ask");
      const message = document.querySelector("#message");
      const answer = document.querySelector("#answer");

      button.addEventListener("click", async () => {
        answer.textContent = "Thinking...";

        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: message.value })
        });

        const data = await response.json();
        answer.textContent = data.answer ?? data.error ?? "No response.";
      });
    </script>
  </body>
</html>
