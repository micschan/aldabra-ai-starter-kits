<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review Sentiment Analyzer</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0d1117; color: #e5edf8; font-family: system-ui, sans-serif; }
      main { width: min(760px, calc(100vw - 32px)); padding: 28px; border: 1px solid #30363d; border-radius: 24px; background: #161b22; }
      textarea { width: 100%; min-height: 130px; padding: 14px; color: inherit; background: #0d1117; border: 1px solid #30363d; border-radius: 14px; font: inherit; }
      button { width: 100%; margin-top: 12px; padding: 12px; color: white; background: #0070f3; border: 0; border-radius: 999px; font: inherit; cursor: pointer; }
      pre { margin-top: 18px; padding: 16px; border-radius: 14px; background: #050914; color: #bfdbfe; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <main>
      <p>Intermediate Starter Kit</p>
      <h1>Product Review Sentiment Analyzer</h1>
      <textarea id="review">Delivery was late, but the product quality is excellent. Support replied quickly.</textarea>
      <button id="run">Analyze review</button>
      <pre id="output"></pre>
    </main>
    <script>
      document.querySelector("#run").addEventListener("click", async () => {
        const output = document.querySelector("#output");
        output.textContent = "Analyzing...";
        const response = await fetch("/api/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ review: document.querySelector("#review").value })
        });
        const data = await response.json();
        output.textContent = data.result ?? data.error ?? "No response.";
      });
    </script>
  </body>
</html>
