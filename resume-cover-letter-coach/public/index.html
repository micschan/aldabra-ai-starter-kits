<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Applicant Screening Assistant</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0d1117; color: #e5edf8; font-family: system-ui, sans-serif; }
      main { width: min(820px, calc(100vw - 32px)); padding: 28px; border: 1px solid #30363d; border-radius: 24px; background: #161b22; }
      textarea { width: 100%; min-height: 110px; margin-top: 10px; padding: 14px; color: inherit; background: #0d1117; border: 1px solid #30363d; border-radius: 14px; font: inherit; }
      button { width: 100%; margin-top: 12px; padding: 12px; color: white; background: #0070f3; border: 0; border-radius: 999px; font: inherit; cursor: pointer; }
      #output { margin-top: 18px; line-height: 1.6; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <main>
      <p>Beginner Starter Kit</p>
      <h1>Applicant Screening Assistant</h1>
      <textarea id="resume">Candidate has React, Node.js, SQL, and customer support automation experience.</textarea>
      <textarea id="job">Junior frontend developer role requiring React, APIs, Git, and teamwork.</textarea>
      <button id="run">Review candidate</button>
      <div id="output"></div>
    </main>
    <script>
      document.querySelector("#run").addEventListener("click", async () => {
        const output = document.querySelector("#output");
        output.textContent = "Writing...";
        const response = await fetch("/api/coach", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            resume: document.querySelector("#resume").value,
            job: document.querySelector("#job").value
          })
        });
        const data = await response.json();
        output.textContent = data.advice ?? data.error ?? "No response.";
      });
    </script>
  </body>
</html>
